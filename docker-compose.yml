version: '3.9'

services:
  frontend:
    build: .
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app/backend
    command: sh -c "npm install -g json-server && json-server backend/db.json --host 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"